<!DOCTYPE html>
<html lang="nb" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kystopplevelser — Under utvikling</title>
  <meta name="robots" content="noindex, nofollow">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/design-system.css">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #0A141D;
      background-image:
        radial-gradient(ellipse at 20% 60%, rgba(44, 95, 138, 0.25) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 20%, rgba(27, 58, 82, 0.3) 0%, transparent 50%);
      font-family: var(--font-body, 'Inter', sans-serif);
      padding: 1.5rem;
    }

    .gate {
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .gate__logo {
      font-family: var(--font-heading, 'Fraunces', serif);
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #F5F2EC;
      text-decoration: none;
      display: inline-block;
      margin-bottom: 2.5rem;
    }

    .gate__card {
      background-color: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      backdrop-filter: blur(12px);
    }

    .gate__wave {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      line-height: 1;
    }

    .gate__title {
      font-family: var(--font-heading, 'Fraunces', serif);
      font-size: 1.375rem;
      font-weight: 400;
      color: #F5F2EC;
      margin-bottom: 0.5rem;
    }

    .gate__subtitle {
      font-size: 0.875rem;
      color: rgba(245, 242, 236, 0.5);
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .gate__form {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .gate__input {
      width: 100%;
      padding: 0.875rem 1rem;
      background-color: rgba(255, 255, 255, 0.07);
      border: 1.5px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      color: #F5F2EC;
      font-size: 1rem;
      font-family: inherit;
      text-align: center;
      letter-spacing: 0.05em;
      transition: border-color 0.2s, background-color 0.2s;
      outline: none;
    }

    .gate__input::placeholder {
      color: rgba(245, 242, 236, 0.3);
      letter-spacing: 0;
    }

    .gate__input:focus {
      border-color: rgba(201, 123, 42, 0.7);
      background-color: rgba(255, 255, 255, 0.1);
    }

    .gate__btn {
      width: 100%;
      padding: 0.875rem 1.5rem;
      background-color: #C97B2A;
      color: #FFFFFF;
      border: none;
      border-radius: 999px;
      font-size: 0.9375rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.15s;
    }

    .gate__btn:hover {
      background-color: #B36A1F;
      transform: translateY(-1px);
    }

    .gate__btn:active {
      transform: translateY(0);
    }

    .gate__error {
      font-size: 0.8125rem;
      color: #F87171;
      display: none;
      margin-top: 0.25rem;
    }

    .gate__error--visible {
      display: block;
    }

    .gate__footer {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: rgba(245, 242, 236, 0.25);
    }
  </style>
</head>
<body>

  <div class="gate">
    <a href="/" class="gate__logo">Kystopplevelser</a>

    <div class="gate__card">
      <div class="gate__wave" aria-hidden="true">⚓</div>
      <h1 class="gate__title">Siden er under utvikling</h1>
      <p class="gate__subtitle">Skriv inn passordet for å se forhåndsvisningen.</p>

      <form class="gate__form" id="gate-form" autocomplete="off">
        <input
          type="password"
          class="gate__input"
          id="gate-input"
          placeholder="Passord"
          autocomplete="current-password"
          aria-label="Passord"
          required
        >
        <p class="gate__error" id="gate-error" role="alert">Feil passord. Prøv igjen.</p>
        <button type="submit" class="gate__btn">Logg inn</button>
      </form>
    </div>

    <p class="gate__footer">© 2025 Kystopplevelser AS</p>
  </div>

  <script>
    var PASS = 'kystopplevelser_26';

    document.getElementById('gate-form').addEventListener('submit', function (e) {
      e.preventDefault();
      var val = document.getElementById('gate-input').value;
      var err = document.getElementById('gate-error');

      if (val === PASS) {
        sessionStorage.setItem('ky_auth', '1');
        var redirect = sessionStorage.getItem('ky_redirect') || '/';
        sessionStorage.removeItem('ky_redirect');
        window.location.replace(redirect);
      } else {
        err.classList.add('gate__error--visible');
        document.getElementById('gate-input').value = '';
        document.getElementById('gate-input').focus();
      }
    });

    // Clear error on input
    document.getElementById('gate-input').addEventListener('input', function () {
      document.getElementById('gate-error').classList.remove('gate__error--visible');
    });

    // If already auth'd, skip
    if (sessionStorage.getItem('ky_auth') === '1') {
      var redirect = sessionStorage.getItem('ky_redirect') || '/';
      sessionStorage.removeItem('ky_redirect');
      window.location.replace(redirect);
    }
  </script>

</body>
</html>
